name: CI
on: [push, pull_request]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
  macos-native:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: aarch64-apple-darwin }
      - uses: Swatinem/rust-cache@v2
      - run: pnpm install --frozen-lockfile
      - run: cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml --target aarch64-apple-darwin
      - run: pnpm --filter @craftel/desktop tauri build --target aarch64-apple-darwin --bundles app
        env:
          APPLE_SIGNING_IDENTITY: '-'
